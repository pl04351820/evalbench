############################################################
### Dataset / Eval Items
############################################################
# The dataset dire
dataset_directory: datasets/bird-interact/bird-interact-lite
# The JSON list of prompts / golden SQLs and eval attributes for the run
dataset_config: datasets/bird-interact/bird-interact-lite/bird_interact_data.jsonl
### Database Info
# List of paths to the YAML files that provide the database connection details
database_configs:
 - datasets/bird-interact/db_configs/postgres.yaml
# The dialect that the dataset_config will be filtered by.
dialects:
 - postgres
query_types:
 - dql
dataset_format: bird-interact-format
setup_directory: datasets/bird-interact/setup
max_turn: 6
#
#
############################################################
### Prompt and Generation Modules
############################################################
# The YAML config for the model to be used for generation.
model_config: datasets/model_configs/gemini_2.5_pro_model.yaml
# The prompt generator module id for prompt generation.
prompt_generator: 'InteractSystemGenerator'
#
#
############################################################
### Scorer Related Configs - See /scorers directory for each scorer.
############################################################
scorers:
  exact_match: null
  llmrater:
    model_config: datasets/model_configs/gemini_1.5-pro-002_model.yaml
  returned_sql: null
  set_match: null
#
#
############################################################
### Reporting Related Configs
############################################################
reporting:
  csv:
    output_directory: 'results'
